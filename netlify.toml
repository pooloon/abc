[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  BASE_PATH = "/"

[[redirects]]
  from = "/api/yahoo/*"
  to = "https://query1.finance.yahoo.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/dart/*"
  to = "https://opendart.fss.or.kr/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/krx/*"
  to = "https://data.krx.co.kr/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
