name: Deploy Investment Planner to GitHub Pages

on:
  push:
    branches: [20260705-investment-planner]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-investment-planner
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build
        env:
          BASE_PATH: /vibeCD/investment/

      - name: Prepare artifact for /investment/ subpath
        run: |
          mkdir -p public/investment
          cp -r dist/* public/investment/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true
          commit_message: "Deploy investment planner to /investment/"
